services:
  minevoice-standalone:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MINEVOICE_BIND_HOST: "0.0.0.0"
      MINEVOICE_BIND_PORT: "24454"
      MINEVOICE_SHARED_SECRET: "change-me"
      MINEVOICE_MAX_PLAYERS: "100"
      MINEVOICE_ENABLE_BANDWIDTH_STATS: "true"
      MINEVOICE_ENABLE_DEBUG_LOG: "false"
    ports:
      - "24454:24454/udp"
    restart: unless-stopped
