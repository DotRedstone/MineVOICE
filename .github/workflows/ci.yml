name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare Gradle wrapper
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew --no-daemon build :standalone-server:installDist

      - name: Run Safety Check
        run: bash scripts/pre-release-check.sh
        
      - name: Verify Docker Image Build
        run: docker build -t minevoice-server:test -f docker/Dockerfile .
